# Полностью локальный контур + публичная ссылка через Ngrok.
#
#   docker compose -f docker-compose.tunnel.yml up --build
#   # приложение будет доступно по вашей статической ссылке Ngrok.
#
# Требуется .env с YANDEX_API_KEY / YANDEX_FOLDER_ID и NGROK_AUTHTOKEN.

services:
  neo4j:
    image: neo4j:5.26-community
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password123}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-password123} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  app:
    build: .
    env_file: .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687   # внутри compose-сети перекрывает localhost из .env
    command: bash scripts/serve.sh
    volumes:
      - ./data/processed:/app/data/processed
      - ./data/raw:/app/data/raw
    ports:
      - "8501:8501"                   # чтобы открыть и локально: http://localhost:8501
    depends_on:
      neo4j:
        condition: service_healthy

  ngrok:
    image: ngrok/ngrok:latest
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http app:8501 --domain=direction-unusual-joyous.ngrok-free.dev
    depends_on:
      - app

volumes:
  neo4j_data:
