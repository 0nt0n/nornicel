# Продакшен-контур для удалённого сервера: Neo4j + приложение (Streamlit UI).
#
# Сценарий: extraction гоняется где угодно (локально у команды), на сервер
# заливаются только готовые data/processed/*.json, из них строится граф + векторная БД.
#
#   docker compose -f docker-compose.prod.yml up -d --build     # поднять
#   docker compose -f docker-compose.prod.yml run --rm app \
#       python scripts/run_pipeline.py --load-only              # загрузить JSON в граф
#
# Подробности: DEPLOY.md

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: minekg-neo4j
    # Порты привязаны к 127.0.0.1: с сервера наружу Neo4j не торчит,
    # для отладки — SSH-туннель: ssh -L 7474:localhost:7474 -L 7687:localhost:7687 user@server
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password123}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-password123} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  app:
    build: .
    container_name: minekg-app
    env_file: .env
    environment:
      # внутри compose-сети Neo4j доступен по имени сервиса — перекрывает localhost из .env
      - NEO4J_URI=bolt://neo4j:7687
    ports:
      - "8501:8501"
    volumes:
      # обработанные JSON заливаются на хост и подхватываются без пересборки образа
      - ./data/processed:/app/data/processed
      - ./data/raw:/app/data/raw
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
