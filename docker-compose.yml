services:
  neo4j:
    image: neo4j:5.26-community      # vector index доступен с 5.13+; фильтруемые свойства — с 2026.01+
    container_name: minekg-neo4j
    ports:
      - "7474:7474"   # HTTP / Neo4j Browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password123          # ДОЛЖНО совпадать с .env (NEO4J_PASSWORD)
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
